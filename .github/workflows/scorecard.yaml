name: Scorecard
on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "30 1 * * 6"

permissions: read-all

jobs:
  workflow:
    name: Reusable Workflow
    uses: action-stars/generic-workflows/.github/workflows/scorecard.yaml@38584cb405d18a37a34a267f18ded72214d0165a # v0.10.0
    permissions:
      id-token: write
      security-events: write
    with:
      retention_days: 7
