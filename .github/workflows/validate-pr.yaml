name: Validate PR

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    outputs:
      changed: ${{ steps.changed.outputs.any_changed }}
      k8s_versions: ${{ steps.setup.outputs.k8s_versions }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2

      - name: Install ghactl
        uses: action-stars/ghactl-action@c556c5f2cfcb1f6643bdecf1bf601c706954a37a # v0.0.1
        with:
          token: ${{ github.token }}
          version: latest

      - name: Install tools
        run: |
          set -euo pipefail

          ghactl tool install --owner rvben --repo rumdl --version latest

      - name: Lint markdown files
        run: rumdl check --output-format github .

      - name: Chart changes
        id: changed
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: charts/**

      - name: Setup
        id: setup
        run: |
          set -euo pipefail

          k8s_versions="$(curl -s https://endoflife.date/api/kubernetes.json | jq -r '[sort_by(.releaseDate) | reverse | .[0:4] | "\(.[].cycle).0"] | join(",")')"
          echo "k8s_versions=${k8s_versions}" >> "${GITHUB_OUTPUT}"

  validate:
    name: Validate
    uses: action-stars/helm-workflows/.github/workflows/validate.yaml@6703f8366b94ae3d7959e3b0c2daf42f8fe29401 # v0.13.1
    needs: setup
    if: needs.setup.outputs.changed == 'true'
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    with:
      chart_dir: charts
      target_branch: main
      helm_docs: true
      helm_docs_args: --template-files=./_templates.gotmpl --template-files=./_chart-readme.md.gotmpl
      changelog: true
      ah_lint: true
      kubeconform: true
      kubeconform_k8s_versions: ${{ needs.setup.outputs.k8s_versions }}
      helm_extra_args: "--timeout 600s"

  check:
    name: Check
    if: always()
    needs:
      - setup
      - validate
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Check
        env:
          INPUT_RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          set -euo pipefail
          read -a results <<< "${INPUT_RESULTS}"
          for result in "${results[@]}"; do
            if [[ "${result}" == "failure" ]] || [[ "${result}" == "cancelled" ]]; then
              echo "::error::Workflow failed!"
              exit 1
            fi
          done
