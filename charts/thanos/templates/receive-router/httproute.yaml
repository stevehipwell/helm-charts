{{- if and .Values.receive.enabled .Values.receive.router.httpRoute.enabled -}}
{{- $serviceName := include "thanos.receive.router.fullname" . -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $serviceName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thanos.labels" . | nindent 4 }}
    {{- with .Values.receive.router.httpRoute.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.receive.router.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.receive.router.httpRoute.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.receive.router.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
  {{- if .Values.receive.router.httpRoute.rules }}
    {{- toYaml .Values.receive.router.httpRoute.rules | nindent 4 }}
  {{- else }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/receive
      backendRefs:
        - name: {{ $serviceName }}
          port: {{ .Values.receive.router.service.httpRemoteWritePort }}
    - backendRefs:
        - name: {{ $serviceName }}
          port: {{ .Values.receive.router.service.httpPort }}
  {{- end }}
{{- end }}
