{{- if and .Values.query.enabled .Values.queryFrontend.enabled .Values.queryFrontend.httpRoute.enabled -}}
{{- $serviceName := include "thanos.queryFrontend.fullname" . -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $serviceName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thanos.labels" . | nindent 4 }}
    {{- with .Values.queryFrontend.httpRoute.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.queryFrontend.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.queryFrontend.httpRoute.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.queryFrontend.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
  {{- if .Values.queryFrontend.httpRoute.rules }}
    {{- toYaml .Values.queryFrontend.httpRoute.rules | nindent 4 }}
  {{- else }}
    - backendRefs:
        - name: {{ $serviceName }}
          port: {{ .Values.queryFrontend.service.httpPort }}
  {{- end }}
{{- end }}
