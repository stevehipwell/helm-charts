{{- if and .Values.query.enabled .Values.query.grpcRoute.enabled -}}
{{- $serviceName := include "thanos.query.fullname" . -}}
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: {{ printf "%s-grpc" ($serviceName | trunc 58 | trimSuffix "-") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thanos.labels" . | nindent 4 }}
    {{- with .Values.query.grpcRoute.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.query.grpcRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.query.grpcRoute.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.query.grpcRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
  {{- if .Values.query.grpcRoute.rules }}
    {{- toYaml .Values.query.grpcRoute.rules | nindent 4 }}
  {{- else }}
    - backendRefs:
        - name: {{ $serviceName }}
          port: {{ .Values.query.service.grpcPort }}
  {{- end }}
{{- end }}
