serviceMonitor:
  enabled: true

additionalEndpoints:
  - dnssrv+_grpc._tcp.kube-prometheus-stack-thanos-discovery.monitoring.svc.cluster.local

additionalReplicaLabels:
  - prometheus_replica

autoGomemlimit:
  enabled: true
  ratio: 0.8

compact:
  enabled: true

  resources:
    requests:
      cpu: 500m
      memory: 1024Mi
    limits:
      cpu: 1000m
      memory: 1024Mi

  persistence:
    enabled: true
    labels:
      foo: bar
    annotations:
      foo: bar

  extraVolumes:
    - name: test
      configMap:
        name: thanos-test

  extraVolumeMounts:
    - name: test
      mountPath: /test

  deduplication:
    enabled: true
    func: penalty

  nodeSelector:
    kubernetes.io/os: linux

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - topologyKey: kubernetes.io/hostname

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule

  tolerations:
    - key: system
      operator: Exists

query:
  autoscaling:
    enabled: true

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  resources:
    requests:
      cpu: 500m
      memory: 1024Mi
    limits:
      cpu: 1000m
      memory: 1024Mi

  extraVolumes:
    - name: test
      configMap:
        name: thanos-test

  extraVolumeMounts:
    - name: test
      mountPath: /test

  nodeSelector:
    kubernetes.io/os: linux

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - topologyKey: kubernetes.io/hostname

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule

  tolerations:
    - key: system
      operator: Exists

  ingress:
    enabled: true
    ingressClassName: test
    hosts:
      - query.chart-example.local
    grpcHosts:
      - query-grpc.chart-example.local
    tls:
      - hosts:
          - query.chart-example.local
          - query-grpc.chart-example.local
        secretName: chart-example-tls

  httpRoute:
    enabled: true
    parentRefs:
      - name: gateway
        namespace: gateway
    hostnames:
      - query.chart-example.local

  grpcRoute:
    enabled: true
    parentRefs:
      - name: gateway
        namespace: gateway
    hostnames:
      - query-grpc.chart-example.local

